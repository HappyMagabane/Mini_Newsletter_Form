<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesheet.css">
    <title>Document</title>
</head>
<body>
    <form class="card-form">
<h2>Join Newsletter</h2>
     <button type="button" id="theme-toggle" class="theme-btn">Switch to Dark Mode</button>
 
  <div class="field">
<label for="name">Full Name</label>
<input id="name" name="name" type="text" required>
<span id="char-counter" class="char-count">0 / 50</span>
</div>
 
  <div class="field">
<label for="email">Email</label>
<input id="email" name="email" type="email" required>
</div>
 
  <div class="field">
<label for="topic">Topic</label>
<select id="topic" name="topic">
<option value="" disabled selected>Select a topic</option>
<option value="web-dev">Web Development</option>
<option value="data-science">Data Science</option>
<option value="ai-ml">AI & Machine Learning</option>
<option value="design">Design</option>
<option value="marketing">Marketing</option>
<option value="entrepreneurship">Entrepreneurship</option>
</select>
<div id="topic-description" class="description-box"></div>
</div>
 
  <button type="submit">Subscribe</button>
</form>
<script>

 const form = document.querySelector('.card-form');
const themeToggle = document.getElementById('theme-toggle');
const body = document.body;
const topicSelect = document.getElementById('topic');
const topicDesc = document.getElementById('topic-description');

// 1. Full Mapping at the top so the whole script can see it
const descriptions = {
    "web-dev": "Get the latest on JavaScript frameworks, C# backend tips, and responsive CSS techniques.",
    "data-science": "Master data analysis, statistical modeling, and visualizing complex datasets with Python and R.",
    "ai-ml": "Explore neural networks, deep learning, and building intelligent automated systems.",
    "design": "Learn about UI/UX principles, color theory, and making accessible web interfaces.",
    "marketing": "Discover digital growth strategies, SEO optimization, and social media engagement tactics.",
    "entrepreneurship": "Insights on starting a business, scaling startups, and professional leadership skills."
};

// 2. Dropdown Logic
topicSelect.addEventListener('change', (event) => {
    const selectedValue = event.target.value;
    
    if (descriptions[selectedValue]) {
        topicDesc.textContent = descriptions[selectedValue];
        topicDesc.style.display = 'block';
    } else {
        topicDesc.style.display = 'none';
    }
});

// 3. Theme Toggle Logic
themeToggle.addEventListener('click', () => {
    body.classList.toggle('dark-mode');
    themeToggle.textContent = body.classList.contains('dark-mode') 
        ? 'Switch to Light Mode' 
        : 'Switch to Dark Mode';
});

// 4. Submit Logic
form.addEventListener('submit', function(event) {
    event.preventDefault(); 
    const submitBtn = form.querySelector('button[type="submit"]');
    const spinner = document.createElement('span');
    spinner.className = 'spinner';
    
    submitBtn.disabled = true;
    submitBtn.innerHTML = ''; 
    submitBtn.appendChild(spinner);
    submitBtn.append('Subscribing...');

    setTimeout(() => {
        const name = document.getElementById('name').value;
        const topicText = topicSelect.options[topicSelect.selectedIndex].text;
        
        form.innerHTML = `
            <div class="success-container">
                <h2>Success!</h2>
                <p>Welcome to the team, <strong>${name}</strong>.</p>
                <p>We've registered your interest in <strong>${topicText}</strong>.</p>
            </div>`;
            
        localStorage.removeItem('newsletter_name');
        localStorage.removeItem('newsletter_email');
    }, 2000);
});

</script>
</body>
</html>
